openapi: 3.1.0
info:
  title: Omen Control Plane API
  version: 0.1.0
  description: Lightweight control-plane API for the Omen dashboard and runtime trigger path.
servers:
  - url: http://localhost:3000
paths:
  /api/runs/start-demo:
    post:
      summary: Start a demo swarm run
      operationId: startDemoRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartDemoRunRequest'
      responses:
        '202':
          description: Run accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartDemoRunResponse'
  /api/runs:
    get:
      summary: List runs
      operationId: listRuns
      responses:
        '200':
          description: Runs
          content:
            application/json:
              schema:
                type: object
                required: [runs]
                properties:
                  runs:
                    type: array
                    items:
                      $ref: '#/components/schemas/RunSummary'
  /api/runs/{id}:
    get:
      summary: Get run details
      operationId: getRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDetail'
  /api/runs/{id}/trace:
    get:
      summary: Get run trace
      operationId: getRunTrace
      parameters:
        - $ref: '#/components/parameters/RunId'
        - in: query
          name: agentId
          schema:
            type: string
        - in: query
          name: eventType
          schema:
            type: string
      responses:
        '200':
          description: Trace events
          content:
            application/json:
              schema:
                type: object
                required: [events]
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentEvent'
  /api/signals:
    get:
      summary: List signals
      operationId: listSignals
      responses:
        '200':
          description: Signals
          content:
            application/json:
              schema:
                type: object
                required: [signals]
                properties:
                  signals:
                    type: array
                    items:
                      $ref: '#/components/schemas/SignalSummary'
  /api/signals/{id}:
    get:
      summary: Get signal detail
      operationId: getSignal
      parameters:
        - $ref: '#/components/parameters/SignalId'
      responses:
        '200':
          description: Signal detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalDetail'
  /api/agents/status:
    get:
      summary: Get agent node status
      operationId: getAgentStatus
      responses:
        '200':
          description: Node status
          content:
            application/json:
              schema:
                type: object
                required: [agents]
                properties:
                  agents:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentNode'
  /api/axl/peers:
    get:
      summary: Get AXL peer status
      operationId: getAxlPeers
      responses:
        '200':
          description: Peer status
          content:
            application/json:
              schema:
                type: object
                required: [peers]
                properties:
                  peers:
                    type: array
                    items:
                      $ref: '#/components/schemas/AxlPeer'
  /api/0g/refs/{runId}:
    get:
      summary: Get 0G references for a run
      operationId: getZeroGRefs
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: 0G refs
          content:
            application/json:
              schema:
                type: object
                required: [refs]
                properties:
                  refs:
                    type: array
                    items:
                      $ref: '#/components/schemas/ZeroGRef'
  /api/config/demo:
    post:
      summary: Update demo configuration
      operationId: updateDemoConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemoConfigUpdate'
      responses:
        '200':
          description: Updated config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemoConfig'
components:
  parameters:
    RunId:
      in: path
      name: id
      required: true
      schema:
        type: string
    SignalId:
      in: path
      name: id
      required: true
      schema:
        type: string
  schemas:
    StartDemoRunRequest:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [mocked, live]
        configOverride:
          type: object
          additionalProperties: true
    StartDemoRunResponse:
      type: object
      required: [runId, status]
      properties:
        runId:
          type: string
        status:
          type: string
          enum: [accepted]
    RunSummary:
      type: object
      required: [id, status, mode, startedAt]
      properties:
        id:
          type: string
        status:
          type: string
        mode:
          type: string
        marketBias:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
    RunDetail:
      allOf:
        - $ref: '#/components/schemas/RunSummary'
        - type: object
          properties:
            activeCandidateCount:
              type: integer
            finalSignalId:
              type: string
              nullable: true
            currentCheckpointRefId:
              type: string
              nullable: true
    AgentEvent:
      type: object
      required: [id, runId, agentId, eventType, status, payload, timestamp]
      properties:
        id:
          type: string
        runId:
          type: string
        agentId:
          type: string
        eventType:
          type: string
        status:
          type: string
        payload:
          type: object
          additionalProperties: true
        timestamp:
          type: string
          format: date-time
        axlMessageId:
          type: string
          nullable: true
        zeroGRefId:
          type: string
          nullable: true
        signalId:
          type: string
          nullable: true
    SignalSummary:
      type: object
      required: [id, asset, direction, confidence, criticDecision, reportStatus]
      properties:
        id:
          type: string
        asset:
          type: string
        direction:
          type: string
        confidence:
          type: integer
        riskReward:
          type: number
          nullable: true
        invalidation:
          type: object
          nullable: true
        status:
          type: string
        criticDecision:
          type: string
        reportStatus:
          type: string
    SignalDetail:
      allOf:
        - $ref: '#/components/schemas/SignalSummary'
        - type: object
          properties:
            evidence:
              type: array
              items:
                type: object
                additionalProperties: true
            chartImages:
              type: array
              items:
                type: string
            analystOutput:
              type: object
              additionalProperties: true
            criticOutput:
              type: object
              additionalProperties: true
            finalReport:
              type: object
              additionalProperties: true
            zeroGRefs:
              type: array
              items:
                $ref: '#/components/schemas/ZeroGRef'
    AgentNode:
      type: object
      required: [id, role, status, lastHeartbeatAt]
      properties:
        id:
          type: string
        role:
          type: string
        status:
          type: string
        peerId:
          type: string
          nullable: true
        lastHeartbeatAt:
          type: string
          format: date-time
    AxlPeer:
      type: object
      required: [peerId, status]
      properties:
        peerId:
          type: string
        status:
          type: string
        metadata:
          type: object
          additionalProperties: true
    ZeroGRef:
      type: object
      required: [id, refType, locator, createdAt]
      properties:
        id:
          type: string
        refType:
          type: string
        locator:
          type: string
        key:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
    DemoConfigUpdate:
      type: object
      properties:
        mode:
          type: string
          enum: [mocked, live, production_like]
        paperTradingEnabled:
          type: boolean
        testnetExecutionEnabled:
          type: boolean
        qualityThresholds:
          type: object
          additionalProperties: true
        providers:
          type: object
          additionalProperties: true
    DemoConfig:
      type: object
      required: [mode, paperTradingEnabled, testnetExecutionEnabled, mainnetExecutionEnabled]
      properties:
        mode:
          type: string
        paperTradingEnabled:
          type: boolean
        testnetExecutionEnabled:
          type: boolean
        mainnetExecutionEnabled:
          type: boolean
        qualityThresholds:
          type: object
          additionalProperties: true
        providers:
          type: object
          additionalProperties: true
