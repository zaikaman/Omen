app = "omen-axl-node"
primary_region = "sin"

[build]
  dockerfile = "deploy/fly/axl.Dockerfile"

[env]
  AXL_BRIDGE_ADDR = "0.0.0.0"
  AXL_API_PORT = "9002"
  AXL_TCP_PORT = "7000"
  AXL_PEERS_JSON = "[\"tls://34.46.48.224:9001\"]"
  AXL_LISTEN_JSON = "[\"tls://0.0.0.0:9001\"]"

[[mounts]]
  source = "axl_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 9002

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/topology"

[[services]]
  protocol = "tcp"
  internal_port = 9001

  [[services.ports]]
    port = 9001

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
